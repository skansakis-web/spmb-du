<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Daftar Ulang Siswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .search-results { max-height: 200px; overflow-y: auto; }
        .input-empty { background-color: #fee2e2 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-sm shadow-md p-6 mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cari Nama Siswa :</label>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Ketik nama siswa" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700">
                <div id="searchResults" class="search-results absolute z-10 w-full bg-white border border-gray-200 rounded-sm mt-1 shadow-lg hidden">
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="btnCari" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-sm transition shadow-sm cursor-pointer">
                    Buka Form
                </button>
            </div>
        </div>

        <div id="notif" class="hidden p-4 mb-6 rounded-sm text-sm font-medium"></div>

        <div id="statsSection" class="hidden space-y-6 mb-6">
            <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 shadow-md rounded-sm">
                    <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3">Statistik Jurusan & Jalur</h3>
                    <div id="statsGabungan" class="text-xs space-y-2"></div>
                </div>
                <div class="bg-white p-4 shadow-md rounded-sm">
                    <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3">Statistik Ruang</h3>
                    <div id="statsRuang" class="text-xs space-y-2"></div>
                </div>
            </div>

            <div class="bg-white p-4 shadow-md rounded-sm">
                <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3 text-red-600">Daftar Siswa Belum Lapor Diri (Jalur Utama)</h3>
                <div id="belumLaporContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs mt-2">
                </div>
            </div>

            <div class="bg-white p-4 shadow-md rounded-sm">
                <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3 text-orange-600">Daftar Siswa Belum Lapor Diri (Jalur Cadangan)</h3>
                <div id="tidakDuContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs mt-2">
                </div>
            </div>
        </div>

        <div id="formContainer" class="hidden bg-white rounded-sm shadow-md p-6">
            <form id="daftarUlangForm" class="grid grid-cols-2 gap-6">
            </form>

            <div class="mt-8 pt-4 border-t border-gray-200 flex justify-end">
                <button id="btnSimpan" class="bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-sm transition shadow-md cursor-pointer">
                    Simpan
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBaWKlzKSJwIV0g0KQvZpGEdwRj6VSsz97Kk8YhXKYdm28DIpZ3VVEEsb1GITNB9KO/exec";

        let masterSiswaData = [];
        let headersData = [];
        let terpilihSiswa = null;

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const btnCari = document.getElementById('btnCari');
        const formContainer = document.getElementById('formContainer');
        const formEl = document.getElementById('daftarUlangForm');
        const btnSimpan = document.getElementById('btnSimpan');
        const notif = document.getElementById('notif');
        const statsSection = document.getElementById('statsSection');

        window.addEventListener('DOMContentLoaded', () => {
            showNotification('Loading....', 'blue');
            fetch(WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    masterSiswaData = data.siswa;
                    headersData = data.headers;
                    hideNotification();
                    renderDashboardStats(data.stats);
                    renderRekapSiswaLists();
                })
                .catch(err => {
                    console.error(err);
                    showNotification('Error.', 'red');
                });
        });

        function renderDashboardStats(stats) {
            if (!stats || !stats.kelompokJurusan) return;
            
            let htmlGabungan = '<table class="w-full text-left border-collapse"><thead><tr class="text-gray-500 border-b text-[10px] uppercase"><th class="pb-1 font-semibold w-2/5">Jurusan / Jalur</th><th class="pb-1 text-center font-semibold">Total</th><th class="pb-1 text-center font-semibold text-green-600">Lapor</th><th class="pb-1 text-center font-semibold text-red-600">Belum</th></tr></thead><tbody>';
            
            for (let jrsName in stats.kelompokJurusan) {
                let dataJurusan = stats.kelompokJurusan[jrsName];
                let belumLaporJrs = dataJurusan.total - dataJurusan.lapor;
                
                htmlGabungan += `<tr class="bg-gray-50 border-b font-bold text-gray-800 text-[13px]"><td class="py-2 px-1 uppercase">${jrsName}</td><td class="py-2 text-center text-gray-700">${dataJurusan.total}</td><td class="py-2 text-center text-green-600">${dataJurusan.lapor}</td><td class="py-2 text-center text-red-600">${belumLaporJrs}</td></tr>`;
                
                for (let jlrName in dataJurusan.jalur) {
                    let dataJalur = dataJurusan.jalur[jlrName];
                    let belumLaporJlr = dataJalur.total - dataJalur.lapor;
                    htmlGabungan += `<tr class="border-b last:border-none text-[12px]"><td class="py-1.5 pl-5 text-gray-600 italic font-medium">${jlrName}</td><td class="py-1.5 text-center text-gray-500">${dataJalur.total}</td><td class="py-1.5 text-center font-semibold text-green-600">${dataJalur.lapor}</td><td class="py-1.5 text-center font-semibold text-red-500">${belumLaporJlr}</td></tr>`;
                }
            }
            htmlGabungan += '</tbody></table>';

            let htmlRuang = '<table class="w-full text-left border-collapse"><thead><tr class="text-gray-500 border-b text-[10px] uppercase"><th class="pb-1 font-semibold w-2/5">Nama Ruang</th><th class="pb-1 text-center font-semibold">Total</th><th class="pb-1 text-center font-semibold text-green-600">Lapor</th><th class="pb-1 text-center font-semibold text-red-600">Belum</th></tr></thead><tbody>';
            for (let key in stats.ruang) {
                let dataRuang = stats.ruang[key];
                let belumLaporRng = dataRuang.total - dataRuang.lapor;
                htmlRuang += `<tr class="border-b last:border-none text-[12px]"><td class="py-2 font-medium text-gray-700">${key}</td><td class="py-2 text-center text-gray-500">${dataRuang.total}</td><td class="py-2 text-center font-semibold text-green-600">${dataRuang.lapor}</td><td class="py-2 text-center font-semibold text-red-500">${belumLaporRng}</td></tr>`;
            }
            htmlRuang += '</tbody></table>';

            document.getElementById('statsGabungan').innerHTML = htmlGabungan;
            document.getElementById('statsRuang').innerHTML = htmlRuang;
            statsSection.classList.remove('hidden');
        }

        function renderRekapSiswaLists() {
            const idxJurusan = headersData.map(h => h.toLowerCase()).indexOf('jurusan');
            const idxJalur = headersData.map(h => h.toLowerCase()).indexOf('jalur');
            const idxLapor = headersData.map(h => h.toLowerCase()).indexOf('lapor diri');
            
            const kelompokBelumLapor = {};
            const kelompokTidakDu = {};
            
            masterSiswaData.forEach(s => {
                const jrs = s.dataLengkap[idxJurusan] || "TANPA JURUSAN";
                const jlr = (s.dataLengkap[idxJalur] || "").toString().toLowerCase().trim();
                const isLapor = s.dataLengkap[idxLapor] === true || s.dataLengkap[idxLapor].toString().toLowerCase() === 'true';
                
                if (!isLapor) {
                    if (jlr === 'cadangan') {
                        if (!kelompokTidakDu[jrs]) kelompokTidakDu[jrs] = [];
                        kelompokTidakDu[jrs].push(s.nama);
                    } else {
                        if (!kelompokBelumLapor[jrs]) kelompokBelumLapor[jrs] = [];
                        kelompokBelumLapor[jrs].push(s.nama);
                    }
                }
            });

            const buildListHtml = (containerId, dataGroup, badgeColor) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                
                for (let jrsName in dataGroup) {
                    const divJrs = document.createElement('div');
                    divJrs.className = 'border border-gray-200 p-3 bg-gray-50 rounded-sm';

                    const title = document.createElement('h4');
                    title.className = 'font-bold uppercase text-gray-700 border-b pb-1 mb-2 text-[11px] tracking-wide flex justify-between';
                    title.innerHTML = `<span>${jrsName}</span> <span class="${badgeColor} px-1.5 py-0.2 rounded-sm">${dataGroup[jrsName].length} Siswa</span>`;
                    divJrs.appendChild(title);

                    const listOl = document.createElement('ol');
                    listOl.className = 'list-decimal list-inside space-y-1 pr-1 text-gray-600';

                    dataGroup[jrsName].sort().forEach(namaSiswa => {
                        const li = document.createElement('li');
                        li.className = 'truncate border-b border-gray-100 last:border-none py-0.5';
                        li.innerText = namaSiswa;
                        listOl.appendChild(li);
                    });

                    divJrs.appendChild(listOl);
                    container.appendChild(divJrs);
                }

                if (Object.keys(dataGroup).length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center py-4 font-medium text-green-600 bg-green-50 border border-green-200 rounded-sm">Semua data siswa telah terpenuhi!</div>';
                }
            };

            buildListHtml('belumLaporContainer', kelompokBelumLapor, 'text-red-600 bg-red-100');
            buildListHtml('tidakDuContainer', kelompokTidakDu, 'text-orange-600 bg-orange-100');
        }

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            searchResults.innerHTML = '';
            terpilihSiswa = null;
            
            if (keyword === '') {
                searchResults.classList.add('hidden');
                return;
            }

            const filtered = masterSiswaData.filter(s => s.nama.toLowerCase().startsWith(keyword));
            
            if (filtered.length === 0) {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 text-sm text-gray-500 italic';
                item.innerText = 'Nama tidak ditemukan';
                searchResults.appendChild(item);
            } else {
                filtered.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'px-4 py-2.5 text-sm hover:bg-blue-50 text-gray-700 cursor-pointer transition';
                    item.innerText = s.nama;
                    item.addEventListener('click', () => {
                        searchInput.value = s.nama;
                        terpilihSiswa = s;
                        searchResults.classList.add('hidden');
                    });
                    searchResults.appendChild(item);
                });
            }
            searchResults.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });

        function checkEmptyStatus(element) {
            if (element.value.trim() === '') {
                element.classList.add('input-empty');
            } else {
                element.classList.remove('input-empty');
            }
        }

        function createInputElement(headerName, index) {
            const div = document.createElement('div');
            let rawValue = terpilihSiswa.dataLengkap[index] !== undefined ? terpilihSiswa.dataLengkap[index] : '';
            let input;

            const nameLower = headerName.toLowerCase();

            if (nameLower === 'nama') {
                div.className = 'flex flex-col col-span-2';
            } else if (nameLower === 'lapor diri' || nameLower === 'daftar ulang' || nameLower === 'grup whatsapp') {
            } else {
                div.className = 'flex flex-col';
            }

            if (nameLower === 'lapor diri' || nameLower === 'daftar ulang' || nameLower === 'grup whatsapp') {
                div.className = 'flex flex-row items-center gap-3 bg-gray-50 p-3 border border-gray-200 rounded-sm h-[42px] mt-6';
                
                input = document.createElement('input');
                input.type = 'checkbox';
                input.name = `col_${index}`;
                input.id = `check_${index}`;
                input.className = 'w-5 h-5 text-blue-600 border-gray-300 rounded-sm focus:ring-blue-500 cursor-pointer';
                
                if (rawValue === true || rawValue.toString().toLowerCase() === 'true') {
                    input.checked = true;
                }

                const label = document.createElement('label');
                label.htmlFor = `check_${index}`;
                label.className = 'text-sm font-bold text-gray-700 cursor-pointer select-none text-xs';
                label.innerText = headerName;

                div.appendChild(input);
                div.appendChild(label);

            } else {
                const label = document.createElement('label');
                label.className = 'text-xs font-bold text-gray-600 uppercase tracking-wide mb-1.5';
                label.innerText = headerName;
                div.appendChild(label);

                if (nameLower === 'ukuran') {
                    input = document.createElement('select');
                    input.name = `col_${index}`;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition cursor-pointer h-[42px]';
                    
                    const listUkuran = ['S', 'M', 'L', 'XL', 'XXL', 'XXXL'];
                    const defaultOpt = document.createElement('option');
                    defaultOpt.value = '';
                    defaultOpt.innerText = '-- Pilih --';
                    input.appendChild(defaultOpt);

                    listUkuran.forEach(uk => {
                        const opt = document.createElement('option');
                        opt.value = uk;
                        opt.innerText = uk;
                        if (rawValue.toString().toUpperCase() === uk) {
                            opt.selected = true;
                        }
                        input.appendChild(opt);
                    });

                } else if (nameLower === 'tanggal lahir') {
                    input = document.createElement('input');
                    input.type = 'date';
                    input.name = `col_${index}`;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition h-[42px]';
                    
                    if (rawValue && rawValue.toString().includes('T')) {
                        input.value = rawValue.toString().split('T')[0];
                    } else if (rawValue) {
                        const d = new Date(rawValue);
                        if (!isNaN(d.getTime())) {
                            input.value = d.toISOString().split('T')[0];
                        } else {
                            input.value = rawValue;
                        }
                    } else {
                        input.value = '';
                    }

                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.name = `col_${index}`;
                    input.value = nameLower === 'nisn' && rawValue.toString().startsWith("'") ? rawValue.toString().substring(1) : rawValue;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition h-[42px]';

                    if (nameLower === 'nama' || nameLower === 'nisn' || nameLower === 'ruang' || nameLower === 'jurusan' || nameLower === 'jalur') {
                        input.readOnly = true;
                        input.classList.add('bg-gray-200', 'cursor-not-allowed', 'text-gray-500');
                    }
                }

                if (!input.readOnly) {
                    checkEmptyStatus(input);
                    input.addEventListener('input', (e) => checkEmptyStatus(e.target));
                    input.addEventListener('change', (e) => checkEmptyStatus(e.target));
                }
                
                div.appendChild(input);
            }
            return div;
        }

        btnCari.addEventListener('click', () => {
            const namaKetik = searchInput.value.trim().toLowerCase();
            
            if (namaKetik === '') {
                alert('Pilih nama dari dropdown.');
                return;
            }

            if (!terpilihSiswa) {
                constしかった = masterSiswaData.find(s => s.nama.toLowerCase() === namaKetik);
                if (しかった) {
                    terpilihSiswa = しかった;
                } else {
                    alert('Pilih nama dari dropdown.');
                    return;
                }
            }

            formEl.innerHTML = '';
            statsSection.classList.add('hidden');

            const headerMap = {};
            headersData.forEach((header, index) => {
                headerMap[header.toLowerCase()] = index;
            });

            const customOrder = [
                'lapor diri', 'daftar ulang',
                'grup whatsapp', 'nomor hp',
                'nama',
                'jenis kelamin', 'ukuran',
                'nisn', 'ruang',
                'jurusan', 'jalur',
                'sekolah asal', 'tahun lulus',
                'tempat lahir', 'tanggal lahir',
                'rt', 'rw',
                'desa/kelurahan', 'kecamatan',
                'kabupaten/kota', 'provinsi'
            ];

            customOrder.forEach(headerName => {
                if (headerMap[headerName] !== undefined) {
                    const el = createInputElement(headersData[headerMap[headerName]], headerMap[headerName]);
                    formEl.appendChild(el);
                }
            });

            formContainer.classList.remove('hidden');
            formContainer.scrollIntoView({ behavior: 'smooth' });
        });

        btnSimpan.addEventListener('click', () => {
            if (!terpilihSiswa) return;

            if(!confirm('Lanjut menyimpan perubahan data untuk ' + terpilihSiswa.nama + '?')) {
                return;
            }

            btnSimpan.disabled = true;
            btnSimpan.innerText = 'Menyimpan...';
            showNotification('Mengirimkan data ke Google Sheet...', 'blue');

            const payloadRowData = [];
            headersData.forEach((header, index) => {
                const nameLower = header.toLowerCase();
                
                if (nameLower === 'no') {
                    payloadRowData.push(terpilihSiswa.dataLengkap[index] !== undefined ? terpilihSiswa.dataLengkap[index] : '');
                } else {
                    const element = formEl.elements[`col_${index}`];
                    
                    if (!element) {
                        payloadRowData.push(terpilihSiswa.dataLengkap[index] !== undefined ? terpilihSiswa.dataLengkap[index] : '');
                    } else if (nameLower === 'lapor diri' || nameLower === 'daftar ulang' || nameLower === 'grup whatsapp') {
                        payloadRowData.push(element.checked);
                    } else if (nameLower === 'nisn') {
                        let cleanNisn = element.value.toString().trim();
                        payloadRowData.push("'" + cleanNisn);
                    } else {
                        payloadRowData.push(element.value);
                    }
                }
            });

            const bodyRequest = {
                rowNum: terpilihSiswa.rowNum,
                rowData: payloadRowData
            };

            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBaWKlzKSJwIV0g0KQvZpGEdwRj6VSsz97Kk8YhXKYdm28DIpZ3VVEEsb1GITNB9KO/exec";
            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(bodyRequest)
            })
            .then(res => res.json())
            .then(res => {
                btnSimpan.disabled = false;
                btnSimpan.innerText = 'Simpan';
                
                if (res.status === 'SUCCESS') {
                    showNotification('Selamat! Data berhasil diperbarui. Halaman akan dimuat ulang...', 'green');
                    
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                } else {
                    showNotification('Gagal memperbarui data: ' + res.message, 'red');
                }
            })
            .catch(err => {
                console.error(err);
                btnSimpan.disabled = false;
                btnSimpan.innerText = 'Simpan';
                showNotification('Terjadi kesalahan jaringan.', 'red');
            });
        });

        showNotification = (text, color) => {
            notif.innerText = text;
            notif.className = 'p-4 mb-6 rounded-sm text-sm font-medium block ';
            if(color === 'blue') notif.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
            if(color === 'green') notif.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
            if(color === 'red') notif.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
        }

        hideNotification = () => {
            notif.classList.add('hidden');
        }
    </script>
</body>
</html>
