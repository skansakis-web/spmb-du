<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Daftar Ulang Siswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .search-results { max-height: 200px; overflow-y: auto; }
        .input-empty { background-color: #fee2e2 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-sm shadow-md p-6 mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cari Nama Siswa :</label>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Ketik nama siswa" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700">
                <div id="searchResults" class="search-results absolute z-10 w-full bg-white border border-gray-200 rounded-sm mt-1 shadow-lg hidden">
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="btnCari" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-sm transition shadow-sm cursor-pointer">
                    Buka Form
                </button>
            </div>
        </div>

        <div id="notif" class="hidden p-4 mb-6 rounded-sm text-sm font-medium"></div>

        <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 hidden">
            <div class="bg-white p-4 shadow-md rounded-sm">
                <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3">Statistik Jurusan & Jalur</h3>
                <div id="statsGabungan" class="text-xs space-y-2"></div>
            </div>
            <div class="bg-white p-4 shadow-md rounded-sm">
                <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-3">Statistik Ruang</h3>
                <div id="statsRuang" class="text-xs space-y-2"></div>
            </div>
        </div>

        <div id="formContainer" class="hidden bg-white rounded-sm shadow-md p-6">
            <form id="daftarUlangForm" class="grid grid-cols-2 gap-6">
            </form>

            <div class="mt-8 pt-4 border-t border-gray-200 flex justify-end">
                <button id="btnSimpan" class="bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-sm transition shadow-md cursor-pointer">
                    Simpan
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBaWKlzKSJwIV0g0KQvZpGEdwRj6VSsz97Kk8YhXKYdm28DIpZ3VVEEsb1GITNB9KO/exec";

        let masterSiswaData = [];
        let headersData = [];
        let terpilihSiswa = null;

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const btnCari = document.getElementById('btnCari');
        const formContainer = document.getElementById('formContainer');
        const formEl = document.getElementById('daftarUlangForm');
        const btnSimpan = document.getElementById('btnSimpan');
        const notif = document.getElementById('notif');
        const statsContainer = document.getElementById('statsContainer');

        window.addEventListener('DOMContentLoaded', () => {
            showNotification('Loading....', 'blue');
            fetch(WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    masterSiswaData = data.siswa;
                    headersData = data.headers;
                    hideNotification();
                    renderDashboardStats(data.stats);
                })
                .catch(err => {
                    console.error(err);
                    showNotification('Error.', 'red');
                });
        });

        function renderDashboardStats(stats) {
            if (!stats || !stats.kelompokJurusan) return;
            
            let htmlGabungan = '<table class="w-full text-left border-collapse"><thead><tr class="text-gray-500 border-b text-[10px] uppercase"><th class="pb-1 font-semibold w-2/5">Jurusan / Jalur</th><th class="pb-1 text-center font-semibold">Total</th><th class="pb-1 text-center font-semibold text-green-600">Lapor</th><th class="pb-1 text-center font-semibold text-red-600">Belum</th></tr></thead><tbody>';
            
            for (let jrsName in stats.kelompokJurusan) {
                let dataJurusan = stats.kelompokJurusan[jrsName];
                let belumLaporJrs = dataJurusan.total - dataJurusan.lapor;
                
                htmlGabungan += `<tr class="bg-gray-50 border-b font-bold text-gray-800 text-[13px]"><td class="py-2 px-1 uppercase">${jrsName}</td><td class="py-2 text-center text-gray-700">${dataJurusan.total}</td><td class="py-2 text-center text-green-600">${dataJurusan.lapor}</td><td class="py-2 text-center text-red-600">${belumLaporJrs}</td></tr>`;
                
                for (let jlrName in dataJurusan.jalur) {
                    let dataJalur = dataJurusan.jalur[jlrName];
                    let belumLaporJlr = dataJalur.total - dataJalur.lapor;
                    htmlGabungan += `<tr class="border-b last:border-none text-[12px]"><td class="py-1.5 pl-5 text-gray-600 italic font-medium">${jlrName}</td><td class="py-1.5 text-center text-gray-500">${dataJalur.total}</td><td class="py-1.5 text-center font-semibold text-green-600">${dataJalur.lapor}</td><td class="py-1.5 text-center font-semibold text-red-500">${belumLaporJlr}</td></tr>`;
                }
            }
            htmlGabungan += '</tbody></table>';

            let htmlRuang = '<table class="w-full text-left border-collapse"><thead><tr class="text-gray-500 border-b text-[10px] uppercase"><th class="pb-1 font-semibold w-2/5">Nama Ruang</th><th class="pb-1 text-center font-semibold">Total</th><th class="pb-1 text-center font-semibold text-green-600">Lapor</th><th class="pb-1 text-center font-semibold text-red-600">Belum</th></tr></thead><tbody>';
            for (let key in stats.ruang) {
                let dataRuang = stats.ruang[key];
                let belumLaporRng = dataRuang.total - dataRuang.lapor;
                htmlRuang += `<tr class="border-b last:border-none text-[12px]"><td class="py-2 font-medium text-gray-700">${key}</td><td class="py-2 text-center text-gray-500">${dataRuang.total}</td><td class="py-2 text-center font-semibold text-green-600">${dataRuang.lapor}</td><td class="py-2 text-center font-semibold text-red-500">${belumLaporRng}</td></tr>`;
            }
            htmlRuang += '</tbody></table>';

            document.getElementById('statsGabungan').innerHTML = htmlGabungan;
            document.getElementById('statsRuang').innerHTML = htmlRuang;
            statsContainer.classList.remove('hidden');
        }

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            searchResults.innerHTML = '';
            terpilihSiswa = null;
            
            if (keyword === '') {
                searchResults.classList.add('hidden');
                return;
            }

            const filtered = masterSiswaData.filter(s => s.nama.toLowerCase().startsWith(keyword));
            
            if (filtered.length === 0) {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 text-sm text-gray-500 italic';
                item.innerText = 'Nama tidak ditemukan';
                searchResults.appendChild(item);
            } else {
                filtered.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'px-4 py-2.5 text-sm hover:bg-blue-50 text-gray-700 cursor-pointer transition';
                    item.innerText = s.nama;
                    item.addEventListener('click', () => {
                        searchInput.value = s.nama;
                        terpilihSiswa = s;
                        searchResults.classList.add('hidden');
                    });
                    searchResults.appendChild(item);
                });
            }
            searchResults.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });

        function checkEmptyStatus(element) {
            if (element.value.trim() === '') {
                element.classList.add('input-empty');
            } else {
                element.classList.remove('input-empty');
            }
        }

        function createInputElement(headerName, index) {
            const div = document.createElement('div');
            let rawValue = terpilihSiswa.dataLengkap[index] !== undefined ? terp
