<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Ulang Siswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .search-results { max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-sm shadow-md p-6 mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cari Nama Siswa :</label>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Ketik nama siswa di sini..." 
                       class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700">
                
                <div id="searchResults" class="search-results absolute z-10 w-full bg-white border border-gray-200 rounded-sm mt-1 shadow-lg hidden">
                    </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="btnCari" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-sm transition shadow-sm cursor-pointer">
                    Buka
                </button>
            </div>
        </div>

        <div id="notif" class="hidden p-4 mb-6 rounded-sm text-sm font-medium"></div>

        <div id="formContainer" class="hidden bg-white rounded-sm shadow-md p-6">
            <form id="daftarUlangForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </form>

            <div class="mt-8 pt-4 border-t border-gray-200 flex justify-end">
                <button id="btnSimpan" class="bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-sm transition shadow-md cursor-pointer">
                    Simpan
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBaWKlzKSJwIV0g0KQvZpGEdwRj6VSsz97Kk8YhXKYdm28DIpZ3VVEEsb1GITNB9KO/exec";

        let masterSiswaData = [];
        let headersData = [];
        let terpilihSiswa = null;

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const btnCari = document.getElementById('btnCari');
        const formContainer = document.getElementById('formContainer');
        const formEl = document.getElementById('daftarUlangForm');
        const btnSimpan = document.getElementById('btnSimpan');
        const notif = document.getElementById('notif');


        window.addEventListener('DOMContentLoaded', () => {
            showNotification('Sedang memuat daftar nama siswa', 'blue');
            fetch(WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    masterSiswaData = data.siswa;
                    headersData = data.headers;
                    hideNotification();
                })
                .catch(err => {
                    console.error(err);
                    showNotification('Gagal memuat data dari Google Sheet. Periksa konfigurasi deploy Web App kamu.', 'red');
                });
        });

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            searchResults.innerHTML = '';
            terpilihSiswa = null;
            
            if (keyword === '') {
                searchResults.classList.add('hidden');
                return;
            }

            const filtered = masterSiswaData.filter(s => s.nama.toLowerCase().startsWith(keyword));
            
            if (filtered.length === 0) {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 text-sm text-gray-500 italic';
                item.innerText = 'Nama tidak ditemukan';
                searchResults.appendChild(item);
            } else {
                filtered.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'px-4 py-2.5 text-sm hover:bg-blue-50 text-gray-700 cursor-pointer transition';
                    item.innerText = s.nama;
                    item.addEventListener('click', () => {
                        searchInput.value = s.nama;
                        terpilihSiswa = s;
                        searchResults.classList.add('hidden');
                    });
                    searchResults.appendChild(item);
                });
            }
            searchResults.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });


        function createInputElement(headerName, index) {
            const div = document.createElement('div');
            let rawValue = terpilihSiswa.dataLengkap[index] !== undefined ? terpilihSiswa.dataLengkap[index] : '';
            let input;

            // Jika ini kolom Nama, buat melebar 2 kolom penuh pada layar medium/besar
            if (headerName.toLowerCase() === 'nama') {
                div.className = 'flex flex-col md:col-span-2';
            } else if (headerName.toLowerCase() === 'lapor diri' || headerName.toLowerCase() === 'daftar ulang') {
                // Jangan diset flex-col dulu di sini agar penataan checkbox konsisten
            } else {
                div.className = 'flex flex-col';
            }


            if (headerName.toLowerCase() === 'lapor diri' || headerName.toLowerCase() === 'daftar ulang') {
                div.className = 'flex flex-row items-center gap-3 bg-gray-50 p-3 border border-gray-200 rounded-sm h-[42px] mt-6';
                
                input = document.createElement('input');
                input.type = 'checkbox';
                input.name = `col_${index}`;
                input.id = `check_${index}`;
                input.className = 'w-5 h-5 text-blue-600 border-gray-300 rounded-sm focus:ring-blue-500 cursor-pointer';
                
                if (rawValue === true || rawValue.toString().toLowerCase() === 'true') {
                    input.checked = true;
                }

                const label = document.createElement('label');
                label.htmlFor = `check_${index}`;
                label.className = 'text-sm font-bold text-gray-700 cursor-pointer select-none';
                label.innerText = headerName;

                div.appendChild(input);
                div.appendChild(label);


            } else {
                const label = document.createElement('label');
                label.className = 'text-xs font-bold text-gray-600 uppercase tracking-wide mb-1.5';
                label.innerText = headerName;
                div.appendChild(label);


                if (headerName.toLowerCase() === 'ukuran') {
                    input = document.createElement('select');
                    input.name = `col_${index}`;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition cursor-pointer h-[42px]';
                    
                    const listUkuran = ['S', 'M', 'L', 'XL', 'XXL', 'XXXL'];
                    const defaultOpt = document.createElement('option');
                    defaultOpt.value = '';
                    defaultOpt.innerText = '-- Pilih Ukuran Baju --';
                    input.appendChild(defaultOpt);

                    listUkuran.forEach(uk => {
                        const opt = document.createElement('option');
                        opt.value = uk;
                        opt.innerText = uk;
                        if (rawValue.toString().toUpperCase() === uk) {
                            opt.selected = true;
                        }
                        input.appendChild(opt);
                    });


                } else if (headerName.toLowerCase() === 'tanggal lahir') {
                    input = document.createElement('input');
                    input.type = 'date';
                    input.name = `col_${index}`;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition h-[42px]';
                    
                    if (rawValue && rawValue.toString().includes('T')) {
                        input.value = rawValue.toString().split('T')[0];
                    } else if (rawValue) {
                        const d = new Date(rawValue);
                        if (!isNaN(d.getTime())) {
                            input.value = d.toISOString().split('T')[0];
                        } else {
                            input.value = rawValue;
                        }
                    } else {
                        input.value = '';
                    }


                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.name = `col_${index}`;
                    input.value = rawValue;
                    input.className = 'px-3 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 text-sm bg-gray-50 focus:bg-white transition h-[42px]';


                    if (headerName.toLowerCase() === 'nama') {
                        input.readOnly = true;
                        input.classList.add('bg-gray-200', 'cursor-not-allowed', 'text-gray-500');
                    }
                    if (headerName.toLowerCase() === 'ruang') {
                        input.readOnly = true;
                        input.classList.add('bg-gray-200', 'cursor-not-allowed', 'text-gray-500');
                    }
                    if (headerName.toLowerCase() === 'jalur') {
                        input.readOnly = true;
                        input.classList.add('bg-gray-200', 'cursor-not-allowed', 'text-gray-500');
                    }
                    if (headerName.toLowerCase() === 'jurusan') {
                        input.readOnly = true;
                        input.classList.add('bg-gray-200', 'cursor-not-allowed', 'text-gray-500');
                    }
                }
                div.appendChild(input);
            }
            return div;
        }

        // 3. Ketika Tombol Cari Ditekan (Menyusun susunan form kustom terbaru)
        btnCari.addEventListener('click', () => {
            const namaKetik = searchInput.value.trim().toLowerCase();
            
            if (namaKetik === '') {
                alert('Silakan ketik nama siswa terlebih dahulu.');
                return;
            }

            if (!terpilihSiswa) {
                const cocok = masterSiswaData.find(s => s.nama.toLowerCase() === namaKetik);
                if (cocok) {
                    terpilihSiswa = cocok;
                } else {
                    alert('Nama yang kamu ketik tidak cocok dengan data siswa mana pun. Silakan pilih dari saran dropdown.');
                    return;
                }
            }

            formEl.innerHTML = '';

            // Petakan index kolom berdasarkan susunan nama header asli di sheet
            const headerMap = {};
            headersData.forEach((header, index) => {
                headerMap[header.toLowerCase()] = index;
            });

            // Susunan urutan kustom terbaru yang diminta Mas Angga
            const customOrder = [
                'lapor diri', 'daftar ulang',
                'nama',
                'nisn', 'ruang',
                'jurusan', 'jalur',
                'jenis kelamin', 'ukuran',
                'sekolah asal', 'tahun lulus',
                'tempat lahir', 'tanggal lahir',
                'rt', 'rw',
                'desa/kelurahan', 'kecamatan',
                'kabupaten/kota', 'provinsi'
            ];

            // 1. Render kolom berdasarkan urutan kustom terstruktur
            customOrder.forEach(headerName => {
                if (headerMap[headerName] !== undefined) {
                    const el = createInputElement(headersData[headerMap[headerName]], headerMap[headerName]);
                    formEl.appendChild(el);
                }
            });

            // 2. Antisipasi jika ada sisa kolom lain di luar list (kecuali kolom 'no')
            headersData.forEach((header, index) => {
                const nameLower = header.toLowerCase();
                if (nameLower !== 'no' && !customOrder.includes(nameLower)) {
                    const el = createInputElement(header, index);
                    formEl.appendChild(el);
                }
            });

            formContainer.classList.remove('hidden');
            formContainer.scrollIntoView({ behavior: 'smooth' });
        });

        // 4. Ketika Tombol Simpan Ditekan
        btnSimpan.addEventListener('click', () => {
            if (!terpilihSiswa) return;

            if(!confirm('Apakah kamu yakin ingin menyimpan perubahan data untuk siswa ' + terpilihSiswa.nama + '?')) {
                return;
            }

            btnSimpan.disabled = true;
            btnSimpan.innerText = 'Menyimpan...';
            showNotification('Sedang mengirimkan perubahan data ke Google Sheet...', 'blue');

            const payloadRowData = [];
            headersData.forEach((header, index) => {
                const nameLower = header.toLowerCase();
                
                if (nameLower === 'no') {
                    payloadRowData.push(terpilihSiswa.dataLengkap[index] !== undefined ? terpilihSiswa.dataLengkap[index] : '');
                } else {
                    const element = formEl.elements[`col_${index}`];
                    if (nameLower === 'lapor diri' || nameLower === 'daftar ulang') {
                        payloadRowData.push(element.checked);
                    } else {
                        payloadRowData.push(element.value);
                    }
                }
            });

            const bodyRequest = {
                rowNum: terpilihSiswa.rowNum,
                rowData: payloadRowData
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(bodyRequest)
            })
            .then(res => res.json())
            .then(res => {
                btnSimpan.disabled = false;
                btnSimpan.innerText = 'Simpan Semua Perubahan';
                
                if (res.status === 'SUCCESS') {
                    showNotification('Selamat! Data berhasil diperbarui di Google Sheet.', 'green');
                    
                    terpilihSiswa.dataLengkap = payloadRowData;
                    const idx = masterSiswaData.findIndex(s => s.rowNum === terpilihSiswa.rowNum);
                    if(idx !== -1) masterSiswaData[idx].dataLengkap = payloadRowData;
                    
                    setTimeout(() => {
                        formContainer.classList.add('hidden');
                        searchInput.value = '';
                        terpilihSiswa = null;
                        hideNotification();
                    }, 3000);
                } else {
                    showNotification('Gagal memperbarui data: ' + res.message, 'red');
                }
            })
            .catch(err => {
                console.error(err);
                btnSimpan.disabled = false;
                btnSimpan.innerText = 'Simpan Semua Perubahan';
                showNotification('Terjadi kesalahan jaringan saat mencoba menyimpan data.', 'red');
            });
        });

        function showNotification(text, color) {
            notif.innerText = text;
            notif.className = 'p-4 mb-6 rounded-sm text-sm font-medium block ';
            if(color === 'blue') notif.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
            if(color === 'green') notif.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
            if(color === 'red') notif.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
        }

        function hideNotification() {
            notif.classList.add('hidden');
        }
    </script>
</body>
</html>
